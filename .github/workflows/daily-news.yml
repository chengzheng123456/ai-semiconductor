name: Daily AI & Semiconductor News

on:
  schedule:
    # 北京时间每天早上 8:00 运行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许 Actions 写入仓库

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news crawler
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python news_crawler.py

      - name: Commit and push report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "longmao-bot"
          git config user.email "longmao@users.noreply.github.com"
          today=$(date -u +"%Y-%m-%d")
          mkdir -p news
          if [ -f output/${today}.md ]; then
            cp output/${today}.md news/${today}.md
            git add news/${today}.md
            git commit -m "Auto: add news report ${today}" || echo "No changes to commit"
            git push
          else
            echo "No output file found"
          fi
