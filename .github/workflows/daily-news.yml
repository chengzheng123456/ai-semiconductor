name: Daily AI & Semiconductor News

on:
  schedule:
    # 北京时间每天早上 8:00 运行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许 GITHUB_TOKEN 写入仓库

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news crawler (generate report + push to GitHub + send WeChat)
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python news_crawler.py

      - name: Show generated report
        run: |
          today=$(date -u +"%Y-%m-%d")
          if [ -f output/${today}.md ]; then
            echo "=== 生成的报告 ==="
            head -30 output/${today}.md
          fi
